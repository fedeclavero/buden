<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wasted on Buden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700;900&family=Marcellus+SC&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #010a13;
      --bg-mid:     #0a1628;
      --gold-dim:   #785a28;
      --gold-main:  #c8aa6e;
      --gold-light: #f0e6d2;
      --cyan:       #0ac8b9;
      --cyan-dim:   #0a8a80;
      --red:        #c84b4b;
      --shadow-gold: 0 0 20px rgba(200,170,110,.45), 0 0 60px rgba(200,170,110,.2);
      --shadow-cyan: 0 0 20px rgba(10,200,185,.5), 0 0 60px rgba(10,200,185,.2);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      color: var(--gold-light);
      font-family: 'Cinzel', serif;
    }

    /* ── Canvas background ── */
    #bg-canvas {
      position: fixed; inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Main layout ── */
    #app {
      position: relative;
      z-index: 1;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      opacity: 0;
      transform: scale(.94);
      animation: fadeIn 1.6s cubic-bezier(.22,.84,.36,1) .3s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; transform: scale(1); }
    }

    /* ── Title ── */
    .title-wrap {
      text-align: center;
      user-select: none;
    }
    .title-main {
      font-family: 'Cinzel Decorative', cursive;
      font-weight: 900;
      font-size: clamp(2.2rem, 6vw, 5rem);
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--gold-light);
      text-shadow:
        0 0 10px var(--gold-main),
        0 0 30px var(--gold-main),
        0 0 70px rgba(200,170,110,.4);
      animation: titlePulse 4s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%,100% { text-shadow: 0 0 10px var(--gold-main), 0 0 30px var(--gold-main), 0 0 70px rgba(200,170,110,.4); }
      50%      { text-shadow: 0 0 16px var(--gold-light), 0 0 50px var(--gold-main), 0 0 100px rgba(200,170,110,.6); }
    }
    .title-sub {
      font-family: 'Marcellus SC', serif;
      font-size: clamp(.75rem, 1.5vw, 1rem);
      letter-spacing: .45em;
      color: var(--gold-dim);
      margin-top: .55rem;
      text-transform: uppercase;
    }

    /* ── Panel shared ── */
    .panel {
      position: relative;
      background: linear-gradient(160deg, rgba(10,22,40,.92) 0%, rgba(1,10,19,.97) 100%);
      border: 1px solid var(--gold-dim);
      padding: 2.4rem 3.2rem;
    }

    /* Corner ornaments */
    .panel::before, .panel::after,
    .panel .corner-bl, .panel .corner-br {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--gold-main);
      border-style: solid;
    }
    .panel::before  { top:-1px;    left:-1px;  border-width: 2px 0 0 2px; }
    .panel::after   { top:-1px;    right:-1px; border-width: 2px 2px 0 0; }
    .panel .corner-bl { bottom:-1px; left:-1px;  border-width: 0 0 2px 2px; }
    .panel .corner-br { bottom:-1px; right:-1px; border-width: 0 2px 2px 0; }

    /* ── Counter panel ── */
    .counter-panel {
      text-align: center;
      min-width: min(90vw, 620px);
    }
    .counter-label {
      font-family: 'Marcellus SC', serif;
      font-size: clamp(.7rem, 1.4vw, .9rem);
      letter-spacing: .4em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 1.1rem;
    }
    .counter-display {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: clamp(3rem, 10vw, 8rem);
      letter-spacing: .05em;
      color: var(--cyan);
      text-shadow: var(--shadow-cyan);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: text-shadow .1s;
    }
    .counter-display.tick {
      text-shadow:
        0 0 28px var(--cyan),
        0 0 70px rgba(10,200,185,.7),
        0 0 120px rgba(10,200,185,.35);
    }
    .counter-sep {
      margin-top: .9rem;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }

    /* ── Description panel ── */
    .desc-panel {
      text-align: center;
      min-width: min(90vw, 580px);
    }
    .desc-text {
      font-family: 'Marcellus SC', serif;
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      letter-spacing: .08em;
      color: var(--gold-main);
      line-height: 1.5;
      text-shadow: 0 0 14px rgba(200,170,110,.35);
    }
    .desc-accent {
      display: block;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: clamp(.65rem, 1.2vw, .8rem);
      letter-spacing: .5em;
      color: var(--red);
      text-transform: uppercase;
      margin-top: .7rem;
      text-shadow: 0 0 12px rgba(200,75,75,.5);
    }

    /* ── Divider rune line ── */
    .rune-line {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: min(90vw, 560px);
      user-select: none;
    }
    .rune-line span.bar {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }
    .rune-line span.diamond {
      width: 8px; height: 8px;
      background: var(--gold-main);
      transform: rotate(45deg);
      box-shadow: 0 0 8px var(--gold-main);
    }

    /* ── Footer ── */
    .footer-rune {
      position: fixed;
      bottom: 1.4rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Marcellus SC', serif;
      font-size: .62rem;
      letter-spacing: .35em;
      color: var(--gold-dim);
      text-transform: uppercase;
      opacity: .6;
      user-select: none;
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="app">
  <!-- Title -->
  <div class="title-wrap">
    <div class="title-main">Wasted on Buden</div>
    <div class="title-sub">&#8729; League of Legends &#8729;</div>
  </div>

  <!-- Rune divider -->
  <div class="rune-line">
    <span class="bar"></span>
    <span class="diamond"></span>
    <span class="bar"></span>
    <span class="diamond"></span>
    <span class="bar"></span>
  </div>

  <!-- Counter -->
  <div class="panel counter-panel">
    <div class="corner-bl"></div>
    <div class="corner-br"></div>
    <div class="counter-label">Tiempo perdido</div>
    <div class="counter-display" id="counter">10h 00m 00s</div>
    <div class="counter-sep"></div>
  </div>

  <!-- Description -->
  <div class="panel desc-panel">
    <div class="corner-bl"></div>
    <div class="corner-br"></div>
    <div class="desc-text">
      Tiempo que nos hizo perder Buden en LoL
      <span class="desc-accent">&#9876; &nbsp; y contando &nbsp; &#9876;</span>
    </div>
  </div>
</div>

<div class="footer-rune">running since the dawn of grief</div>

<script>
/* ===================================================
   CANVAS BACKGROUND: hex particles + fog
=================================================== */
(function () {
  var canvas = document.getElementById('bg-canvas');
  var ctx = canvas.getContext('2d');
  var W, H;

  function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  var HEX_SIZE = 38;
  function hexPath(cx, cy, r) {
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
      var a = Math.PI / 180 * (60 * i - 30);
      var x = cx + r * Math.cos(a);
      var y = cy + r * Math.sin(a);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
  }
  function drawHexGrid() {
    var cols = Math.ceil(W / (HEX_SIZE * 1.73)) + 2;
    var rows = Math.ceil(H / (HEX_SIZE * 1.5)) + 2;
    ctx.strokeStyle = 'rgba(200,170,110,0.04)';
    ctx.lineWidth = 1;
    for (var r = -1; r < rows; r++) {
      for (var c = -1; c < cols; c++) {
        var offset = c % 2 === 0 ? 0 : HEX_SIZE * 0.87;
        hexPath(c * HEX_SIZE * 1.73, r * HEX_SIZE * 1.5 + offset, HEX_SIZE - 1);
        ctx.stroke();
      }
    }
  }

  var particles = [];
  for (var i = 0; i < 70; i++) {
    particles.push({
      x: Math.random(), y: Math.random(),
      r: 0.8 + Math.random() * 2.2,
      vx: (Math.random() - 0.5) * 0.0003,
      vy: -(Math.random() * 0.0003 + 0.0001),
      alpha: 0.1 + Math.random() * 0.5,
      cyan: Math.random() > 0.6,
      phase: Math.random() * Math.PI * 2
    });
  }

  var fogs = [];
  for (var j = 0; j < 5; j++) {
    fogs.push({
      x: Math.random(), y: Math.random(),
      rx: 0.25 + Math.random() * 0.3,
      ry: 0.15 + Math.random() * 0.2,
      vx: (Math.random() - 0.5) * 0.00008,
      vy: (Math.random() - 0.5) * 0.00006,
      t: Math.random() * Math.PI * 2
    });
  }

  function loop(ts) {
    ctx.clearRect(0, 0, W, H);

    var grad = ctx.createRadialGradient(W * 0.5, H * 0.5, 0, W * 0.5, H * 0.5, Math.max(W, H) * 0.7);
    grad.addColorStop(0, '#0a1628');
    grad.addColorStop(1, '#010a13');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    fogs.forEach(function (f) {
      f.x += f.vx; f.y += f.vy; f.t += 0.003;
      if (f.x < -0.4) f.x = 1.4;
      if (f.x > 1.4)  f.x = -0.4;
      if (f.y < -0.4) f.y = 1.4;
      if (f.y > 1.4)  f.y = -0.4;
      var a = 0.028 + 0.018 * Math.sin(f.t);
      var fg = ctx.createRadialGradient(f.x * W, f.y * H, 0, f.x * W, f.y * H, f.rx * W);
      fg.addColorStop(0, 'rgba(10,22,40,' + a + ')');
      fg.addColorStop(0.5, 'rgba(10,200,185,' + (a * 0.25) + ')');
      fg.addColorStop(1, 'rgba(10,22,40,0)');
      ctx.fillStyle = fg;
      ctx.beginPath();
      ctx.ellipse(f.x * W, f.y * H, f.rx * W, f.ry * H, 0, 0, Math.PI * 2);
      ctx.fill();
    });

    drawHexGrid();

    particles.forEach(function (p) {
      p.x += p.vx; p.y += p.vy;
      if (p.y < -0.01) p.y = 1.01;
      if (p.x < 0) p.x = 1;
      if (p.x > 1) p.x = 0;
      var pulse = p.alpha * (0.6 + 0.4 * Math.sin(ts * 0.0015 + p.phase));
      ctx.beginPath();
      ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.cyan
        ? 'rgba(10,200,185,' + pulse + ')'
        : 'rgba(200,170,110,' + pulse + ')';
      ctx.fill();
    });

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}());

/* ===================================================
   COUNTER: starts at 10h, counts up every second, NEVER RESETS
=================================================== */
(function () {
  var el = document.getElementById('counter');
  
  // Base initial REQUIRED: 10 hours
  const BASE_HOURS = 10;
  // --- FECHA DE INICIO GLOBAL Y ETERNA ---
  // Establecemos una fecha absoluta. Desde este momento exacto en el tiempo, 
  // el contador avanzará igual para TODO el mundo y jamás se reiniciará.
  const absoluteStartTime = new Date("2026-03-16T00:00:00-03:00").getTime();

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function updateTimer() {
    const now = Date.now();
    const elapsed = Math.floor((now - absoluteStartTime) / 1000);
    const totalSeconds = (BASE_HOURS * 3600) + elapsed;
    
    var h = Math.floor(totalSeconds / 3600);
    var m = Math.floor((totalSeconds % 3600) / 60);
    var s = totalSeconds % 60;
    
    // No pad for hours because it is >= 300
    el.textContent = h + 'h ' + pad(m) + 'm ' + pad(s) + 's';
  }

  function tick() {
    updateTimer();
    el.classList.remove('tick');
    void el.offsetWidth;
    el.classList.add('tick');
    setTimeout(function () { el.classList.remove('tick'); }, 300);
  }

  updateTimer();
  setInterval(tick, 1000);
}());
</script>
</body>
</html>
